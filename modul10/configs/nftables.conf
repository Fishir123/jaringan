#!/usr/sbin/nft -f
# Modul 10 - Firewall srv01 (adaptasi: srv01 = router+DNS+DHCP+web)
# Default policy DROP pada input & forward (hardening), output accept.
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # koneksi yang sudah terjalin + loopback
        ct state established,related accept
        ct state invalid drop
        iif lo accept

        # ICMP (ping) untuk diagnosa
        ip protocol icmp accept
        ip6 nexthdr ipv6-icmp accept

        # SSH (administrasi)
        tcp dport 22 accept

        # Web server (Modul 6): HTTP + HTTPS
        tcp dport { 80, 443 } accept

        # DNS server (Modul 5): TCP + UDP 53
        tcp dport 53 accept
        udp dport 53 accept

        # DHCP server (Modul 5): client -> server UDP 67
        udp dport 67 accept

        # log paket yang ditolak (rate-limited) lalu drop sesuai policy
        limit rate 5/minute burst 5 packets counter log prefix "nft-input-drop: "
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # routing antar subnet lab (Modul 4): izinkan trafik yang sudah terjalin
        ct state established,related accept
        ct state invalid drop

        # izinkan trafik keluar dari LAN-B internal menuju jaringan lain (router)
        iifname "enp0s9" accept
        # izinkan balik via NAT/LAN
        iifname "enp0s3" oifname "enp0s9" accept
        iifname "enp0s8" accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
